name: Build Mobile Apps
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Fake structure
        run: |
          mkdir -p ../tmp
          cp main.dart ../tmp/main.dart
          cp pubspec.yaml ../tmp/pubspec.yaml
          rm -f main.dart pubspec.yaml
          flutter create --org com.kreatix --project-name bytebeat --platforms=android .
          cp ../tmp/main.dart lib/main.dart
          cp ../tmp/pubspec.yaml pubspec.yaml
          echo "android.newDsl=false" >> android/gradle.properties
      - name: Install dependencies & patch jcenter
        run: |
          flutter pub get
          find /home/runner/.pub-cache/ -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
      - name: Build Android APK & AAB
        run: |
          flutter build apk --release -t lib/main.dart
          flutter build appbundle --release -t lib/main.dart
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bytebeat-Android-Builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Fake structure
        run: |
          mkdir -p ../tmp
          cp main.dart ../tmp/main.dart
          cp pubspec.yaml ../tmp/pubspec.yaml
          rm -f main.dart pubspec.yaml
          flutter create --org com.kreatix --project-name bytebeat --platforms=ios .
          cp ../tmp/main.dart lib/main.dart
          cp ../tmp/pubspec.yaml pubspec.yaml
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS App Unsigned
        run: flutter build ios --no-codesign --release -t lib/main.dart
      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Bytebeat-Unsigned.ipa Payload
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bytebeat-iOS-Builds
          path: build/ios/iphoneos/Bytebeat-Unsigned.ipa
