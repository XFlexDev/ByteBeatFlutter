name: Build Mobile Apps
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Flutter Android project
        run: |
          mkdir -p bytebeat-android
          cd bytebeat-android
          flutter create --org com.kreatix --project-name bytebeat --platforms=android .
          # Copy original source files if they exist
          [ -f ../lib/main.dart ] && cp ../lib/main.dart lib/main.dart
          [ -f ../pubspec.yaml ] && cp ../pubspec.yaml pubspec.yaml
      - name: Install dependencies
        working-directory: bytebeat-android
        run: flutter pub get
      - name: Build Android APK
        working-directory: bytebeat-android
        run: flutter build apk --release
      - name: Build Android App Bundle
        working-directory: bytebeat-android
        run: flutter build appbundle --release
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bytebeat-Android-Builds
          path: |
            bytebeat-android/build/app/outputs/flutter-apk/app-release.apk
            bytebeat-android/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Flutter iOS project
        run: |
          mkdir -p bytebeat-ios
          cd bytebeat-ios
          flutter create --org com.kreatix --project-name bytebeat --platforms=ios .
          # Copy original source files if they exist
          [ -f ../lib/main.dart ] && cp ../lib/main.dart lib/main.dart
          [ -f ../pubspec.yaml ] && cp ../pubspec.yaml pubspec.yaml
          # Disable code signing for unsigned build
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
      - name: Install dependencies
        working-directory: bytebeat-ios
        run: flutter pub get
      - name: Build iOS App Unsigned
        working-directory: bytebeat-ios
        run: flutter build ios --no-codesign --release
      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r bytebeat-ios/build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Bytebeat-Unsigned.ipa Payload
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bytebeat-iOS-Builds
          path: build/ios/iphoneos/Bytebeat-Unsigned.ipa
